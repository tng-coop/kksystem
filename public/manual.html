<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TNG Co-op - System Manual</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --surface: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #cbd5e1;
      --primary: #4361ee;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.6;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }
    header {
      text-align: center;
      padding: 4rem 2rem;
      background: linear-gradient(180deg, rgba(67, 97, 238, 0.15) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header p {
      color: var(--text-muted);
      font-size: 1.1rem;
      margin-top: 1rem;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }
    .step-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      margin-bottom: 4rem;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .step-card h2 {
      margin-top: 0;
      font-size: 1.8rem;
      color: var(--primary);
    }
    .lang-switcher {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .lang-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .lang-btn:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    .lang-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .screenshot {
      width: 100%;
      height: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-top: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .desc {
      color: var(--text-muted);
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>TNG Co-op System Manual</h1>
    <p>Official User Guide & Documentation (ユーザーマニュアル)</p>
  </header>

  <div class="container">
    <div class="lang-switcher" id="lang-switcher">
      <button class="lang-btn active" data-lang="en">English (Global)</button>
      <button class="lang-btn" data-lang="jp">日本語 (Japanese)</button>
    </div>

    <div class="step-card">
      <h2 data-en="1. The Financial Dashboard" data-jp="1. 財務ダッシュボード">1. The Financial Dashboard</h2>
      <p class="desc" data-en="Review your 24-month capital growth and member distribution at a glance. The data initializes automatically in Demo Mode." data-jp="24ヶ月の資本成長と組合員の分布を一目で確認できます。データはデモモードで自動的に初期化されます。"></p>
      <img id="img-dashboard" class="screenshot" src="screenshots/01-dashboard-en.png" alt="Dashboard Screenshot" />
    </div>

    <div class="step-card">
      <h2 data-en="2. Member Management" data-jp="2. 組合員管理">2. Member Management</h2>
      <p class="desc" data-en="Register new members and click any row to expand their full lifetime contribution history right inside the table." data-jp="新しい組合員を登録し、任意の行をクリックして過去の出資履歴をテーブル内で展開表示します。"></p>
      <img id="img-members" class="screenshot" src="screenshots/02-members-en.png" alt="Members Screenshot" />
    </div>

    <div class="step-card">
      <h2 data-en="3. Recording Capital" data-jp="3. 出資金の記録">3. Recording Capital</h2>
      <p class="desc" data-en="Log new financial contributions securely. The software automatically attributes deposits cleanly directly to your active member profile database." data-jp="新しい出資金を安全に記録します。ソフトウェアは自動的にアクティブな組合員プロフィールデータベースに入金を帰属させます。"></p>
      <img id="img-contributions" class="screenshot" src="screenshots/03-contributions-en.png" alt="Contributions Screenshot" />
    </div>

    <div class="step-card">
      <h2 data-en="4. Printing Certificates" data-jp="4. 証明書の印刷">4. Printing Certificates</h2>
      <p class="desc" data-en="Generate perfectly scaled native print-ready mailing labels and officially formatted desktop capital certificates effortlessly." data-jp="完璧にスケーリングされたネイティブの印刷用宛名ラベルと公式フォーマットの出資証明書を簡単に生成します。"></p>
      <img id="img-print" class="screenshot" src="screenshots/04-print-labels-en.png" alt="Print UI Screenshot" />
    </div>
  </div>

  <script>
    const btns = document.querySelectorAll('.lang-btn');
    const setLanguage = (lang) => {
      btns.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
      document.querySelectorAll('[data-en]').forEach(el => {
        el.textContent = el.dataset[lang] || el.dataset['en'];
      });
      document.getElementById('img-dashboard').src = `screenshots/01-dashboard-${lang}.png`;
      document.getElementById('img-members').src = `screenshots/02-members-${lang}.png`;
      document.getElementById('img-contributions').src = `screenshots/03-contributions-${lang}.png`;
      document.getElementById('img-print').src = `screenshots/04-print-labels-${lang}.png`;
    };
    btns.forEach(b => {
      b.addEventListener('click', () => setLanguage(b.dataset.lang));
    });
  </script>
</body>
</html>
