name: Deploy Demo to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        
      - name: Run E2E Integration Suite (Gatekeeper)
        run: npm run test:e2e
        
      - name: Build Demo Mode
        run: npm run build
        env:
          # Ensure Demo Mode is built into the static bundle
          VITE_DEMO_MODE: "true"

      - name: Generate Manual Screenshots (Zero-Blob)
        run: npm run screenshots
          
      - name: Verify Documentation Assets Integrity
        run: |
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('dist/manual.html')) throw 'Missing manual.html in bundle';
            const expected = ['01-dashboard-en.png', '01-dashboard-jp.png', '02-members-en.png', '02-members-jp.png', '03-contributions-en.png', '03-contributions-jp.png', '04-print-labels-en.png', '04-print-labels-jp.png'];
            for (const img of expected) {
              if (!fs.existsSync('dist/screenshots/' + img)) throw new Error('MISSING ASSET (404 RISK): ' + img);
            }
            console.log('✅ All 8 translated EN/JP documentation images successfully verified against the build artifact.');
          "

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite outputs to dist directory by default
          path: './dist'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
